apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-gpu-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.ngc.nvidia.com/nvidia
    chart: gpu-operator
    targetRevision: "v${version}"
    helm:
      values: |
        # Node feature discovery
        nfd:
          enabled: true

        # GPU feature discovery
        gfd:
          enabled: true

        # Enable MIG support with mixed strategy
        mig:
          strategy: mixed  # Supports both MIG and non-MIG workloads

        # Disable driver installation since EKS AMI already has drivers
        driver:
          enabled: false

        # EKS AMIs come with the container toolkit installed
        toolkit:
          enabled: false

        # Device plugin configuration
        devicePlugin:
          enabled: true

        # DCGM exporter for monitoring
        dcgmExporter:
          enabled: true
          serviceMonitor:
            enabled: ${service_monitor_enabled}
            interval: 15s
            honorLabels: false
            additionalLabels:
              release: kube-prometheus-stack
          config:
            create: true
            name: custom-dcgm-exporter-metrics
            data: |
              # Format
              # If line starts with a '#' it is considered a comment
              # DCGM FIELD, Prometheus metric type, help message

              # Clocks
              DCGM_FI_DEV_SM_CLOCK,  gauge, SM clock frequency (in MHz).
              DCGM_FI_DEV_MEM_CLOCK, gauge, Memory clock frequency (in MHz).

              # Temperature
              DCGM_FI_DEV_MEMORY_TEMP, gauge, Memory temperature (in C).
              DCGM_FI_DEV_GPU_TEMP,    gauge, GPU temperature (in C).

              # Power
              DCGM_FI_DEV_POWER_USAGE,              gauge, Power draw (in W).
              DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION, counter, Total energy consumption since boot (in mJ).

              # PCIE
              DCGM_FI_PROF_PCIE_TX_BYTES,  counter, Total number of bytes transmitted through PCIe TX via NVML.
              DCGM_FI_PROF_PCIE_RX_BYTES,  counter, Total number of bytes received through PCIe RX via NVML.
              DCGM_FI_DEV_PCIE_REPLAY_COUNTER, counter, Total number of PCIe retries.

              # Utilization (the sample period varies depending on the product)
              DCGM_FI_DEV_GPU_UTIL,      gauge, GPU utilization (in %).
              DCGM_FI_DEV_MEM_COPY_UTIL, gauge, Memory utilization (in %).
              DCGM_FI_DEV_ENC_UTIL,      gauge, Encoder utilization (in %).
              DCGM_FI_DEV_DEC_UTIL ,     gauge, Decoder utilization (in %).

              # Errors and violations
              DCGM_FI_DEV_XID_ERRORS,            gauge,   Value of the last XID error encountered.
              DCGM_FI_DEV_POWER_VIOLATION,       counter, Throttling duration due to power constraints (in us).
              DCGM_FI_DEV_THERMAL_VIOLATION,     counter, Throttling duration due to thermal constraints (in us).
              DCGM_FI_DEV_SYNC_BOOST_VIOLATION,  counter, Throttling duration due to sync-boost constraints (in us).
              DCGM_FI_DEV_BOARD_LIMIT_VIOLATION, counter, Throttling duration due to board limit constraints (in us).
              DCGM_FI_DEV_LOW_UTIL_VIOLATION,    counter, Throttling duration due to low utilization (in us).
              DCGM_FI_DEV_RELIABILITY_VIOLATION, counter, Throttling duration due to reliability constraints (in us).

              # Memory usage
              DCGM_FI_DEV_FB_FREE, gauge, Framebuffer memory free (in MiB).
              DCGM_FI_DEV_FB_USED, gauge, Framebuffer memory used (in MiB).

              # ECC
              DCGM_FI_DEV_ECC_SBE_VOL_TOTAL, counter, Total number of single-bit volatile ECC errors.
              DCGM_FI_DEV_ECC_DBE_VOL_TOTAL, counter, Total number of double-bit volatile ECC errors.
              DCGM_FI_DEV_ECC_SBE_AGG_TOTAL, counter, Total number of single-bit persistent ECC errors.
              DCGM_FI_DEV_ECC_DBE_AGG_TOTAL, counter, Total number of double-bit persistent ECC errors.

              # Retired pages
              DCGM_FI_DEV_RETIRED_SBE,     counter, Total number of retired pages due to single-bit errors.
              DCGM_FI_DEV_RETIRED_DBE,     counter, Total number of retired pages due to double-bit errors.
              DCGM_FI_DEV_RETIRED_PENDING, counter, Total number of pages pending retirement.

              # NVLink
              DCGM_FI_DEV_NVLINK_CRC_FLIT_ERROR_COUNT_TOTAL, counter, Total number of NVLink flow-control CRC errors.
              DCGM_FI_DEV_NVLINK_CRC_DATA_ERROR_COUNT_TOTAL, counter, Total number of NVLink data CRC errors.
              DCGM_FI_DEV_NVLINK_REPLAY_ERROR_COUNT_TOTAL,   counter, Total number of NVLink retries.
              DCGM_FI_DEV_NVLINK_RECOVERY_ERROR_COUNT_TOTAL, counter, Total number of NVLink recovery errors.
              DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL,            counter, Total number of NVLink bandwidth counters for all lanes.
              DCGM_FI_DEV_NVLINK_BANDWIDTH_L0,               counter, The number of bytes of active NVLink rx or tx data including both header and payload.
              DCGM_FI_PROF_NVLINK_TX_BYTES,                  gauge,   Total number of bytes of active NVLink tx (transmit) data including both header and payload.
              DCGM_FI_PROF_NVLINK_RX_BYTES,                  gauge,   Total number of bytes of active NVLink rx (receive) data including both header and payload.

              # VGPU License status
              DCGM_FI_DEV_VGPU_LICENSE_STATUS, gauge, vGPU License status

              # Remapped rows
              DCGM_FI_DEV_UNCORRECTABLE_REMAPPED_ROWS, counter, Number of remapped rows for uncorrectable errors
              DCGM_FI_DEV_CORRECTABLE_REMAPPED_ROWS,   counter, Number of remapped rows for correctable errors
              DCGM_FI_DEV_ROW_REMAP_FAILURE,           gauge,   Whether remapping of rows has failed

        # Node status exporter
        nodeStatusExporter:
          enabled: false

        # Sandbox device plugin
        sandboxDevicePlugin:
          enabled: false

        kataSandboxDevicePlugin:
          enabled: false

        # Operator configuration
        operator:
          defaultRuntime: containerd
          runtimeClass: nvidia

        # MIG Manager configuration with embedded MIG profiles
        migManager:
          enabled: true
          env:
            - name: WITH_REBOOT
              value: "true"
          config:
            create: true
            name: custom-mig-parted-configs
            default: "all-disabled"
            data:
              config.yaml: |-
                version: v1
                mig-configs:
                  all-disabled:
                    - devices: all
                      mig-enabled: false

                  # P4D profiles (A100 40GB)
                  # https://docs.nvidia.com/datacenter/tesla/mig-user-guide/index.html#a100-mig-profiles
                  p4d-half-balanced:
                    - devices: [0, 1, 2, 3]
                      mig-enabled: true
                      mig-devices:
                        "1g.5gb": 2
                        "2g.10gb": 1
                        "3g.20gb": 1
                    - devices: [4, 5, 6, 7]
                      mig-enabled: false

                  p4d-all-small:
                    - devices: all
                      mig-enabled: true
                      mig-devices:
                        "1g.5gb": 7

                  p4d-mixed-workload:
                    - devices: [0, 1]
                      mig-enabled: true
                      mig-devices:
                        "1g.5gb": 4
                        "2g.10gb": 1
                    - devices: [2, 3]
                      mig-enabled: true
                      mig-devices:
                        "3g.20gb": 1
                        "1g.5gb": 2
                    - devices: [4, 5, 6, 7]
                      mig-enabled: false

                  p4d-inference-optimized:
                    - devices: [0, 1, 2, 3, 4, 5]
                      mig-enabled: true
                      mig-devices:
                        "1g.5gb": 6
                    - devices: [6, 7]
                      mig-enabled: false

                  # P4DE profiles (A100 80GB)
                  # https://docs.nvidia.com/datacenter/tesla/mig-user-guide/index.html#a100-mig-profiles
                  p4de-half-balanced:
                    - devices: [0, 1, 2, 3]
                      mig-enabled: true
                      mig-devices:
                        "1g.10gb": 2
                        "2g.20gb": 1
                        "3g.40gb": 1
                    - devices: [4, 5, 6, 7]
                      mig-enabled: false

                  p4de-all-small:
                    - devices: all
                      mig-enabled: true
                      mig-devices:
                        "1g.10gb": 7

                  p4de-mixed-workload:
                    - devices: [0, 1]
                      mig-enabled: true
                      mig-devices:
                        "1g.10gb": 3
                        "2g.20gb": 1
                        "3g.40gb": 1
                    - devices: [2, 3]
                      mig-enabled: true
                      mig-devices:
                        "7g.80gb": 1
                    - devices: [4, 5, 6, 7]
                      mig-enabled: false

                  p4de-inference-optimized:
                    - devices: [0, 1, 2, 3, 4, 5]
                      mig-enabled: true
                      mig-devices:
                        "1g.10gb": 4
                        "2g.20gb": 1
                    - devices: [6, 7]
                      mig-enabled: false

                  p4de-training-optimized:
                    - devices: [0, 1]
                      mig-enabled: true
                      mig-devices:
                        "3g.40gb": 1
                        "2g.20gb": 1
                    - devices: [2, 3, 4, 5]
                      mig-enabled: true
                      mig-devices:
                        "7g.80gb": 1
                    - devices: [6, 7]
                      mig-enabled: false

                  # P5 profiles (H100 80GB)
                  # https://docs.nvidia.com/datacenter/tesla/mig-user-guide/index.html#h100-mig-profiles
                  p5-half-balanced:
                    - devices: [0, 1, 2, 3]
                      mig-enabled: true
                      mig-devices:
                        "1g.10gb": 2
                        "2g.20gb": 1
                        "3g.40gb": 1
                    - devices: [4, 5, 6, 7]
                      mig-enabled: false

                  p5-all-small:
                    - devices: all
                      mig-enabled: true
                      mig-devices:
                        "1g.10gb": 7

                  p5-inference-optimized:
                    - devices: [0, 1, 2, 3, 4, 5]
                      mig-enabled: true
                      mig-devices:
                        "1g.10gb": 4
                        "2g.20gb": 1
                    - devices: [6, 7]
                      mig-enabled: false

                  # P6 profiles (B200 180GB)
                  # https://docs.nvidia.com/datacenter/tesla/mig-user-guide/index.html#h200-mig-profiles
                  p6-b200-half-balanced:
                    - devices: [0, 1, 2, 3]
                      mig-enabled: true
                      mig-devices:
                        "1g.23gb": 1
                        "2g.45gb": 1
                        "4g.90gb": 1
                    - devices: [4, 5, 6, 7]
                      mig-enabled: false

                  p6-b200-all-small:
                    - devices: all
                      mig-enabled: true
                      mig-devices:
                        "1g.23gb": 7

                  p6-b200-inference-optimized:
                    - devices: [0, 1, 2, 3, 4, 5]
                      mig-enabled: true
                      mig-devices:
                        "1g.23gb": 5
                        "2g.40gb": 1
                    - devices: [6, 7]
                      mig-enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: gpu-operator
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
