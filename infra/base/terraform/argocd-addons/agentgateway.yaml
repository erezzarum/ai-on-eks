apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentgateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: cr.agentgateway.dev/charts
    targetRevision: v${version}
    chart: agentgateway
    helm:
      skipCrds: false
      values: |
        ${user_values_yaml}
  destination:
    namespace: agentgateway-system
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true